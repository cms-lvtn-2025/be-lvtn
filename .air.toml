root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/run_all.sh"
  cmd = """
    go build -o ./tmp/common ./src/service/common/main.go &&
    go build -o ./tmp/server ./src/server/main.go &&
    echo '#!/bin/bash
    echo "Starting Common Service..."
    ./tmp/common &

    echo "Starting Server ..."
    ./tmp/server &

    wait' > ./tmp/run_all.sh &&
    chmod +x ./tmp/run_all.sh
  """
  delay = 0
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true